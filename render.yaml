services:
  - type: web
    name: xinmei
    runtime: docker
    branch: main
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        value: file:/app/data/xinmei.db
      - key: DEEPSEEK_API_KEY
        sync: false
